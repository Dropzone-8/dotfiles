# --- tmux Configuration ---
# Location: ~/.tmux.conf
# Reload: Ctrl+B then r

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0
set -g mouse on

# --- Splits ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# --- Navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Theme: Emberforge ---
# Custom theme created on 2026-06-17 with Copilot's help.
# Built from custom dark background, Dark 2026 (text),
# Farmhouse Dark (accents) - with custom teal and burnt orange.

# --- Status Bar ---
set -g status-position top
set -g status-style 'bg=#1a1a1a fg=#bfbfbf'
set -g status-left '#[fg=#3a96dd,bold] #S '
set -g status-right '#[fg=#555555] %Y-%m-%d  %H:%M '
set -g status-left-length 30
setw -g window-status-current-style 'fg=#5ac6c6 bold'

# --- Copy Mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
if-shell "uname -r | grep -qi microsft" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'win32yank.exe -i --crlf'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and cancel 'xclip -selection clipboard'"

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
